info:
  name: createQuestionnaire
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:3000/questionnaires
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: Géographie mondiale
      - name: createdBy
        type: text
        value: "1"
      - name: questions
        type: text
        value: '[{"content":"Où se trouve Paris sur cette carte ?","response":[{"x":0.1,"y":0.2},{"x":0.5,"y":0.1},{"x":0.3,"y":0.8}]},{"content":"Où se trouve Berlin sur cette carte ?","response":[{"x":0.4,"y":0.3},{"x":0.6,"y":0.2},{"x":0.5,"y":0.7}]}]'
      - name: images
        type: file
        value:
          - C:\Users\lfnox\OneDrive\Images\tout\baba.jpg
        contentType: image/jpeg
      - name: images
        type: file
        value:
          - C:\Users\lfnox\OneDrive\Images\tout\baba.jpg
        contentType: image/jpeg
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status 201", function() {
          expect(res.status).to.equal(201);
        });

        test("Réponse contient id", function() {
          expect(res.body.id).to.exist;
        });

        test("Réponse contient title", function() {
          expect(res.body.title).to.equal("Géographie mondiale");
        });

        test("Réponse contient questions", function() {
          expect(res.body.questions).to.be.an("array");
          expect(res.body.questions.length).to.equal(2);
        });

        test("Les questions ont un id et un média", function() {
          res.body.questions.forEach(function(q) {
            expect(q.id).to.exist;
            expect(q.media).to.exist;
          });
        });
