info:
  name: createQuestion
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/questions
  body:
    type: json
    data: |-
      {
        "content": "Quelle est la capitale de la France ?",
        "image": null,
        "createdBy": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status 201", function() {
          expect(res.status).to.equal(201);
        });

        test("Réponse contient id", function() {
          expect(res.body.id).to.exist;
        });

        test("Réponse contient content", function() {
          expect(res.body.content).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
