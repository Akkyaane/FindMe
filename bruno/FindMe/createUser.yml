info:
  name: createUser
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/users
  body:
    type: json
    data: |-
      {
        "email": "leanne@example.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status 201", function() {
            expect(res.status).to.equal(201);
        });

        test("Réponse contient name", function() {
          expect(res.body.name).to.exist;
        });

        test("Réponse contient email", function() {
          expect(res.body.email).to.exist;
        });

        test("Réponse contient password (hashé)", function() {
          expect(res.body.password).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
