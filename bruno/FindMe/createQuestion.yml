info:
  name: createQuestion
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/questions
  body:
    type: multipart-form
    data:
      - name: content
        type: text
        value: Quelle est la capitale de la France ?
      - name: createdBy
        type: text
        value: "1"
      - name: image
        type: file
        value:
          - C:\Users\lfnox\OneDrive\Images\tout\baba.jpg
        contentType: image/jpeg
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status 201", function() {
          expect(res.status).to.equal(201);
        });

        test("Réponse contient id", function() {
          expect(res.body.id).to.exist;
        });

        test("Réponse contient content", function() {
          expect(res.body.content).to.exist;
        });

        test("Réponse contient media", function() {
          expect(res.body.media).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
